name: WASDE Dashboard Build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 17 9,10,11,12 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run WASDE data builder
        run: python wasde_data_builder.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wasde_full_data.json cotton_wasde_dashboard.html
          git diff --staged --quiet || git commit -m "WASDE auto-update $(date +'%Y-%m-%d')"
          git push
